name: Knip

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  knip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install

      - name: Run Knip
        run: bunx turbo run knip --filter=web --filter=dashboard --filter=api -- --reporter github-actions
